{% set name = "streamlit-avatar" %}
{% set version = "0.1.3" %}

package:
  name: "{{ name|lower }}"
  version: "{{ version }}"

source:
  url: "https://pypi.io/packages/source/{{ name[0] }}/{{ name }}/{{ name.replace('-', '_') }}-{{ version }}.tar.gz"
  sha256: 023893bd80db5a923d397fc64d27c7a972107da4f0bea0feb99a32f9363f2691

build:
  number: 0
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  skip: True  # [py<37]

requirements:
  host:
    - pip
    - python
    - wheel
    - setuptools
  run:
    - python
    - streamlit >=0.63

test:
  imports:
    - streamlit_avatar
  commands:
    - pip check
    - python -c "from importlib.metadata import version; assert(version('{{ name }}')=='{{ version }}')"
  requires:
    - pip

about:
  home: "https://github.com/ppspps824/streamlit_avatar"
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: Component to display avatar icon in Streamlit
  doc_url: https://github.com/ppspps824/streamlit_avatar/blob/main/README.md
  dev_url: https://github.com/ppspps824/streamlit_avatar

extra:
  recipe-maintainers:
    - Andrii-Osipov
